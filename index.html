<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ocean Breeze Café - Restaurant Booking Practice</title>
    <style>
        :root {
            --primary-color: #0284c7;
            --primary-hover: #0369a1;
            --bg-color: #f0f9ff;
            --card-bg: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
            --accent-color: #f59e0b;
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 12px;
        }

        .app-container {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(2, 132, 199, 0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid #bae6fd;
            margin-top: 10px;
        }

        header h1 {
            font-size: 1.4rem;
            color: var(--primary-color);
            margin-bottom: 4px;
        }

        header p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .media-container {
            width: 100%;
            height: 220px;
            background-color: #e0f2fe;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 12px;
            position: relative;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .character-bubble {
            background: #f0f9ff;
            border-left: 4px solid var(--primary-color);
            padding: 12px;
            border-radius: 8px;
            text-align: left;
            margin-bottom: 12px;
        }

        .character-name {
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 4px;
            font-size: 0.8rem;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .story-text {
            font-size: 1rem;
            line-height: 1.4;
            font-style: italic;
        }

        .interaction-panel {
            background: #fffbeb;
            padding: 14px;
            border-radius: 10px;
            text-align: left;
            margin-bottom: 16px;
            border: 1px dashed #fef3c7;
        }

        .interaction-panel p {
            font-weight: 600;
            margin-bottom: 8px;
            color: #d97706;
            font-size: 0.9rem;
        }

        .option-line {
            margin: 8px 0;
            font-size: 0.95rem;
            color: #334155;
            padding-left: 15px;
            position: relative;
            line-height: 1.3;
        }

        .option-line::before {
            content: "•";
            color: var(--accent-color);
            font-weight: bold;
            position: absolute;
            left: 0;
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .voice-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 1.05rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(2, 132, 199, 0.2);
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .voice-btn:active {
            background-color: var(--primary-hover);
            transform: scale(0.98);
        }

        .voice-btn:disabled {
            background-color: #cbd5e1;
            box-shadow: none;
        }

        .restart-btn {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid #e2e8f0;
            padding: 8px 16px;
            font-size: 0.85rem;
            border-radius: 20px;
            cursor: pointer;
        }

        .status-box {
            margin-top: 12px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            background: #f8fafc;
            width: 100%;
        }

        .status-active {
            color: var(--accent-color);
            font-weight: 600;
            animation: pulse 1.5s infinite;
        }

        .status-success { color: var(--success-color); font-weight: 600; }
        .status-error { color: #ef4444; font-weight: 600; }

        .transcript-zone {
            margin-top: 6px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .transcript-text { font-weight: bold; color: #ef4444; }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>🌊 Ocean Breeze Café ☕</h1>
        <p>Luyện nói tiếng Anh: Đặt bàn view biển rẽ nhánh</p>
    </header>
    
    <div class="media-container">
        <img id="scenery-img" src="cafe_front.jpg" alt="Ocean Breeze Cafe Front">
    </div>

    <div class="character-bubble">
        <div class="character-name"><span> receptionist </span> 🐬 Chloe</div>
        <div id="story" class="story-text">...</div>
    </div>

    <div class="interaction-panel" id="interaction-box">
        <p id="panel-title">🔊 Nhấn nút dưới rồi đọc TO câu gợi ý:</p>
        <div id="options-list"></div>
    </div>

    <div class="controls">
        <button id="start-btn" class="voice-btn">
            <span id="btn-icon">🎙️</span> <span id="btn-text">Bắt đầu nói (Chạm để nói)</span>
        </button>
        <button class="restart-btn" onclick="resetGame()">Đặt bàn lại từ đầu 🔄</button>
    </div>
    
    <div class="status-box">
        <div id="status-text">Sẵn sàng 🌴 Hãy cấp quyền truy cập Micro khi được hỏi.</div>
        <div class="transcript-zone">Hệ thống nghe được: <span id="transcript-text" class="transcript-text">...</span></div>
    </div>
</div>

<script>
    // Hệ thống kịch bản rẽ nhánh tại Quán Cà phê Bờ Biển
    const scriptTree = {
        'start': {
            text: 'Chloe: "Welcome to Ocean Breeze Café! 🌊 Ocean waves and fresh coffee are waiting for you. How can I help you today? Would you like to book a table inside or outside on the beach?"',
            img: 'cafe_front.jpg',
            keywords: {
                'inside': 'inside_scene',
                'outside': 'outside_scene',
                'beach': 'outside_scene'
            },
            options: [
                "I would like to book a table inside",
                "I want to sit outside on the beach"
            ]
        },
        'inside': { // Bí danh bổ sung phòng trường hợp nhận diện ngắn gọn
            text: 'Chloe: "Inside is perfect! Air-conditioned and cozy. We have two options left: a table near the live music stage 🎸 or near the glass window with a sea view 🖼️. Which one do you prefer?"',
            img: 'cafe_inside.jpg',
            keywords: {
                'music': 'music_scene',
                'stage': 'music_scene',
                'window': 'window_scene',
                'glass': 'window_scene'
            },
            options: [
                "I prefer the table near the music stage",
                "Let's choose the table near the window"
            ]
        },
        'inside_scene': { // Đồng bộ với node trên để tránh lỗi gõ phím
            text: 'Chloe: "Inside is perfect! Air-conditioned and cozy. We have two options left: a table near the live music stage 🎸 or near the glass window with a sea view 🖼️. Which one do you prefer?"',
            img: 'cafe_inside.jpg',
            keywords: {
                'music': 'music_scene',
                'stage': 'music_scene',
                'window': 'window_scene',
                'glass': 'window_scene'
            },
            options: [
                "I prefer the table near the music stage",
                "Let's choose the table near the window"
            ]
        },
        'outside_scene': {
            text: 'Chloe: "Awesome choice! 🌅 Sitting outside with the sea breeze is magical. Do you want to order some signature iced coconut coffee 🥥 or a refreshing tropical fruit juice 🍹 while waiting for your table?"',
            img: 'cafe_beach.jpg',
            keywords: {
                'coconut': 'coconut_end',
                'coffee': 'coconut_end',
                'juice': 'juice_end',
                'fruit': 'juice_end'
            },
            options: [
                "I will take an iced coconut coffee",
                "Give me a tropical fruit juice please"
            ]
        },
        'music_scene': {
            text: 'Chloe: "Wonderful! You will enjoy our acoustic band tonight at 8 PM 🎙️🎸. Your table is reserved successfully. See you tonight! Bye! 👋✨"',
            img: 'cafe_music.jpg',
            keywords: {}, 
            options: []
        },
        'window_scene': {
            text: 'Chloe: "Excellent! The ocean view through the glass window is absolutely gorgeous 🌊🖼️. Your table is ready. Have a wonderful time at our cafe! Bye! 👋☕"',
            img: 'cafe_window.jpg',
            keywords: {}, 
            options: []
        },
        'coconut_end': {
            text: 'Chloe: "Sweet choice! Our iced coconut coffee is the best seller here 🥥☕. Your beach table and drink are secured. Enjoy the sunset! Thank you! 🐬🎉"',
            img: 'cafe_coconut.jpg',
            keywords: {}, 
            options: []
        },
        'juice_end': {
            text: 'Chloe: "Super refreshing! A cold tropical fruit juice on the beach is pure heaven 🍹🌴. Your table is all set. Thank you and have a magical day! 🍉🎉"',
            img: 'cafe_juice.jpg',
            keywords: {}, 
            options: []
        }
    };

    let currentStage = 'start';

    // Kích hoạt API Speech Recognition
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;

    if (!SpeechRecognition) {
        alert("Thiết bị này cần mở bằng Google Chrome (Android/PC) hoặc Safari (iPhone) để dùng nhận diện giọng nói!");
    } else {
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US'; 
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
    }

    const startBtn = document.getElementById('start-btn');
    const btnText = document.getElementById('btn-text');
    const btnIcon = document.getElementById('btn-icon');
    const statusText = document.getElementById('status-text');
    const transcriptText = document.getElementById('transcript-text');
    const sceneryImg = document.getElementById('scenery-img');
    const storyText = document.getElementById('story');
    const optionsList = document.getElementById('options-list');
    const interactionBox = document.getElementById('interaction-box');
    const panelTitle = document.getElementById('panel-title');

    if (recognition) {
        startBtn.addEventListener('click', () => {
            try {
                recognition.start();
            } catch(e) {
                console.log("Hệ thống nhận diện đang hoạt động.");
            }
        });

        recognition.onstart = () => {
            statusText.className = "status-active";
            statusText.innerText = "🎙️ Đang nghe... Hãy đọc TO câu thoại tiếng Anh mong muốn.";
            btnText.innerText = "Hệ thống đang lắng nghe...";
            btnIcon.innerText = "🛑";
            startBtn.disabled = true;
        };

        recognition.onspeechend = () => {
            recognition.stop();
            startBtn.disabled = false;
            btnText.innerText = "Bắt đầu nói (Chạm để nói)";
            btnIcon.innerText = "🎙️";
        };

        recognition.onresult = (event) => {
            const resultText = event.results[0][0].transcript.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").trim();
            transcriptText.innerText = `"${event.results[0][0].transcript}"`;
            
            let isMatched = false;
            const currentKeywords = scriptTree[currentStage].keywords;

            for (let key in currentKeywords) {
                if (resultText.includes(key)) {
                    currentStage = currentKeywords[key];
                    updateApplicationState();
                    isMatched = true;
                    break;
                }
            }

            if (isMatched) {
                statusText.className = "status-success";
                statusText.innerText = "✅ Đặt bàn thành công một phần! Cảnh đã chuyển.";
            } else {
                statusText.className = "status-error";
                statusText.innerText = "❌ Chưa nhận diện được lựa chọn này. Bạn thử đọc lại to, rõ hơn xíu nhé!";
            }
        };

        recognition.onerror = (event) => {
            startBtn.disabled = false;
            btnText.innerText = "Bắt đầu nói (Chạm để nói)";
            btnIcon.innerText = "🎙️";
            statusText.className = "status-error";
            statusText.innerText = "Lỗi kết nối Micro: " + event.error;
        };
    }

    function updateApplicationState() {
        const stage = scriptTree[currentStage];
        storyText.innerText = stage.text;
        sceneryImg.src = stage.img;
        optionsList.innerHTML = '';
        
        if (stage.options && stage.options.length > 0) {
            panelTitle.style.display = 'block';
            panelTitle.innerHTML = "🔊 Nhấn nút dưới rồi đọc TO câu gợi ý:";
            startBtn.style.display = 'inline-flex';
            
            stage.options.forEach(option => {
                const div = document.createElement('div');
                div.className = 'option-line';
                div.innerHTML = `👉 <strong>${option}</strong>`;
                optionsList.appendChild(div);
            });
        } else {
            // Kết thúc kịch bản đặt bàn thành công
            panelTitle.innerHTML = `<p style="color: var(--success-color); text-align:center; margin-bottom:0; font-weight:bold;">🎉 Hoàn thành đặt bàn! Chúc bạn có một buổi hẹn hò view biển thật lãng mạn! 🌅☕</p>`;
            startBtn.style.display = 'none';
            statusText.className = "status-success";
            statusText.innerText = "Quá trình đặt bàn hoàn tất thành công.";
        }
    }

    function resetGame() {
        currentStage = 'start';
        transcriptText.innerText = "...";
        statusText.className = "";
        statusText.innerText = "Sẵn sàng 🌴 Nhấn nút để kích hoạt microphone.";
        updateApplicationState();
    }

    // Tự động tải trạng thái ban đầu khi load trang
    window.addEventListener('DOMContentLoaded', () => {
        updateApplicationState();

        // Tự động phát âm thanh chào mừng (nếu có file welcome.wav)
        const introAudio = new Audio('welcome.wav');
        introAudio.play().catch(() => {
            const playAudioOnInteraction = () => {
                introAudio.play();
                document.removeEventListener('click', playAudioOnInteraction);
                document.removeEventListener('touchstart', playAudioOnInteraction);
            };
            document.addEventListener('click', playAudioOnInteraction);
            document.addEventListener('touchstart', playAudioOnInteraction);
        });
    });
</script>

</body>
</html>
